<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Usuario y Contraseña</title>
    <link rel="stylesheet" href="userstyle.css">
</head>

<body>
    <div class="logo"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQC97F3FukNaIqu7qUyZJ9zafkFJS86d0rDLGycXOiAZKGnKP49AzKOyxBe9uD9Z00PUrM&usqp=CAU" alt="logocesde"></div>
    <div class="from-container">
        <h2>Inicio de Sesión</h2>
        <form action="login" method="post">
            <div class="form-group">
                <label for="useername">Nombre de Ususario</label>
                <input type="text" id="useername" name="useername" required>

            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <button type="submit">Inciar Sesión</button>
            </div>
        </form>

    </div>
</body>
</html>
